<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Explosion</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: radial-gradient(ellipse at center, #2d1f3d 0%, #1a0a1a 100%);
            min-height: 100vh;
        }

        /* 中心光效 */
        .center-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255,107,157,0.6) 0%, transparent 70%);
            pointer-events: none;
            z-index: 1;
        }

        /* 中心爱心源 */
        .heart-source {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            animation: pulseSource 1s ease-in-out infinite;
        }

        .heart-source::before {
            content: '💖';
            font-size: 80px;
            filter: drop-shadow(0 0 30px #ff6b9d) drop-shadow(0 0 60px #ff6b9d);
        }

        @keyframes pulseSource {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.3); }
        }

        /* 发射的爱心 */
        .heart {
            position: fixed;
            top: 50%;
            left: 50%;
            pointer-events: none;
            z-index: 10;
            font-size: 30px;
            will-change: transform, opacity;
        }

        /* 3D 爱心样式 */
        .heart-3d {
            filter: drop-shadow(0 0 10px currentColor);
            text-shadow:
                0 0 5px currentColor,
                0 0 15px currentColor,
                0 0 30px currentColor;
        }

        /* 消息文字 */
        .message {
            position: fixed;
            top: 15%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            text-align: center;
            opacity: 0;
            animation: fadeInMessage 2s ease-out 1s forwards;
        }

        .message h1 {
            font-family: 'Georgia', serif;
            font-size: 4rem;
            font-weight: bold;
            background: linear-gradient(135deg, #ff6b9d, #ffd93d, #ff6b9d);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 3s ease infinite;
            filter: drop-shadow(0 0 20px rgba(255,107,157,0.5));
            margin-bottom: 20px;
        }

        .message p {
            font-size: 1.5rem;
            color: #ffb6c1;
            letter-spacing: 5px;
            opacity: 0.8;
        }

        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes fadeInMessage {
            from { opacity: 0; transform: translateX(-50%) translateY(30px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* 计数器 */
        .counter {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            padding: 12px 30px;
            border-radius: 30px;
            border: 1px solid rgba(255,107,157,0.3);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .counter span {
            color: #ffb6c1;
        }

        .counter-num {
            font-size: 1.8rem;
            color: #ff6b9d;
            font-weight: bold;
        }

        /* 重播按钮 */
        .replay-btn {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            background: linear-gradient(135deg, #ff6b9d, #c44569);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            opacity: 0;
            animation: fadeIn 1s ease 3s forwards;
            box-shadow: 0 10px 30px rgba(255,107,157,0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .replay-btn:hover {
            transform: translateX(-50%) scale(1.1);
            box-shadow: 0 15px 40px rgba(255,107,157,0.6);
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* 爱心飘散动画 */
        @keyframes heartFloat {
            0% {
                transform: translate(-50%, -50%) scale(0.3) rotate(0deg);
                opacity: 1;
            }
            20% {
                opacity: 1;
            }
            100% {
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="center-glow"></div>
    <div class="heart-source" id="source"></div>

    <div class="message">
        <h1>I Love You</h1>
        <p>Forever & Always</p>
    </div>

    <button class="replay-btn" onclick="launchHearts()">💖 再来一次</button>

    <div class="counter">
        <span>💝</span>
        <span class="counter-num" id="count">0</span>
    </div>

    <script>
        let totalCount = 0;
        const countEl = document.getElementById('count');
        const sourceEl = document.getElementById('source');

        // 爱心符号和颜色
        const hearts = ['❤️', '💖', '💗', '💕', '💓', '💘', '💝', '💞', '❣️', '♥'];
        const colors = ['#ff6b9d', '#ff4757', '#c44569', '#f8a5c2', '#ffd93d', '#ff7f50', '#ff69b4', '#e74c3c', '#ff1493', '#ff0080'];

        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart heart-3d';

            // 随机选择爱心符号和颜色
            const symbol = hearts[Math.floor(Math.random() * hearts.length)];
            const color = colors[Math.floor(Math.random() * colors.length)];

            heart.textContent = symbol;
            heart.style.color = color;

            // 随机大小
            const size = 20 + Math.random() * 40;
            heart.style.fontSize = size + 'px';

            // 随机方向和距离
            const angle = Math.random() * Math.PI * 2; // 360度
            const distance = 200 + Math.random() * 500; // 飞行距离
            const duration = 2 + Math.random() * 3; // 动画时长
            const rotation = (Math.random() - 0.5) * 720; // 旋转角度

            // 计算终点位置
            const endX = Math.cos(angle) * distance;
            const endY = Math.sin(angle) * distance;

            // 设置动画
            heart.style.animation = `heartFloat ${duration}s ease-out forwards`;

            // 使用 JavaScript 控制更精确的轨迹
            const startTime = performance.now();
            let progress = 0;

            function animateHeart(currentTime) {
                progress = (currentTime - startTime) / (duration * 1000);

                if (progress < 1) {
                    // 使用缓动函数
                    const easeProgress = 1 - Math.pow(1 - progress, 3);

                    // 计算当前位置（带有一些曲线效果）
                    const currentX = endX * easeProgress;
                    const currentY = endY * easeProgress - Math.sin(progress * Math.PI) * 100; // 添加向上的弧线

                    // 计算当前旋转和缩放
                    const currentRotation = rotation * easeProgress;
                    const currentScale = 0.3 + easeProgress * 0.7 * (1 - progress * 0.3);

                    heart.style.transform = `translate(calc(-50% + ${currentX}px), calc(-50% + ${currentY}px)) scale(${currentScale}) rotate(${currentRotation}deg)`;
                    heart.style.opacity = 1 - progress;

                    requestAnimationFrame(animateHeart);
                } else {
                    heart.remove();
                }
            }

            document.body.appendChild(heart);
            requestAnimationFrame(animateHeart);

            // 更新计数
            totalCount++;
            countEl.textContent = totalCount;
        }

        function launchHearts() {
            // 中心源闪烁效果
            sourceEl.style.animation = 'none';
            sourceEl.offsetHeight; // 触发重绘
            sourceEl.style.animation = 'pulseSource 0.3s ease-in-out 5';

            // 发射大量爱心
            const count = 150 + Math.floor(Math.random() * 100);

            for (let i = 0; i < count; i++) {
                setTimeout(() => {
                    createHeart();
                }, i * 15); // 每15ms发射一个
            }
        }

        // 页面加载自动发射
        window.onload = function() {
            setTimeout(launchHearts, 500);
        };

        // 点击屏幕也能发射
        document.addEventListener('click', (e) => {
            if (e.target.tagName !== 'BUTTON') {
                for (let i = 0; i < 30; i++) {
                    setTimeout(() => {
                        createHeart();
                    }, i * 20);
                }
            }
        });
    </script>
</body>
</html>
